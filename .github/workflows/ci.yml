name: ci
on: [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }     # pygame-supported (§H); device milestones need it
      # flipjump 1.5.1 (the 0x06 hex.vec2 register-screen device, §2.1) is not yet on PyPI — install it
      # editable from the flip-jump 1.5.1 branch. TEMPORARY (M11c): reverts to a pinned PyPI release once
      # 1.5.1 is merged to flip-jump main and published.
      - name: install flipjump 1.5.1 (0x06 device)
        run: |
          git clone --depth 1 --branch 1.5.1 https://github.com/tomhea/flip-jump.git "$RUNNER_TEMP/flip-jump"
          pip install -e "$RUNNER_TEMP/flip-jump[io]"
          python -c "import flipjump; print('flipjump', flipjump.__version__, flipjump.__file__)"
      - run: pip install -e ".[dev]"
      - run: bash scripts/test.sh
      - run: bash scripts/build.sh
      - name: assert R4 (flat) + R-2 (assemble ceiling)
        run: |
          python - <<'PY'
          import json; m = json.load(open("build/metrics.json"))
          assert m["storage_mode"] == "flat", m
          assert m.get("full_artifact_flat", True), m          # full 160x100 artifact span < flat limit (R4)
          if "assemble_seconds_max" in m:        # M11c bake-off guard (R-2)
              assert m["assemble_seconds"] < m["assemble_seconds_max"], m
          print("guards OK:", {k: m.get(k) for k in
                ("storage_mode", "assemble_seconds", "assemble_seconds_max", "d2_choice")})
          PY
